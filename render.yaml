# Render deployment configuration
# https://render.com/docs/yaml-spec
services:
  - type: web
    name: content-broadcasting-system
    runtime: node
    plan: free
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: cbs-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: BASE_URL
        fromService:
          type: web
          name: content-broadcasting-system
          property: url
      - key: LOG_LEVEL
        value: info
      # Optional Redis — remove these if not using a Redis instance
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: cbs-redis
      #     property: connectionString

databases:
  - name: cbs-postgres
    plan: free
    databaseName: content_broadcasting
    user: cbs_user
